services:
  postgres:
    image: postgres:15-alpine
    container_name: fitbuddy_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitbuddy}
      POSTGRES_USER: ${POSTGRES_USER:-fitbuddy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitbuddy_local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/migrations/001_food_analysis.sql:/docker-entrypoint-initdb.d/02_food_analysis.sql
      - ./database/migrations/002_supplements.sql:/docker-entrypoint-initdb.d/03_supplements.sql
      - ./database/migrations/003_challenges.sql:/docker-entrypoint-initdb.d/04_challenges.sql
      - ./database/migrations/004_restaurants.sql:/docker-entrypoint-initdb.d/05_restaurants.sql
      - ./database/migrations/005_mindset.sql:/docker-entrypoint-initdb.d/06_mindset.sql
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitbuddy_user} -d ${POSTGRES_DB:-fitbuddy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: fitbuddy_n8n
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-fitbuddy}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-fitbuddy_user}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-fitbuddy_local}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=${N8N_PORT:-5050}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5050}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-local_dev_key_change_before_production}
      - EXECUTIONS_PROCESS=main
      - GENERIC_TIMEZONE=${TIMEZONE:-UTC}
      - N8N_LOG_LEVEL=info
      - N8N_DIAG_OPT_OUT=true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./config:/home/node/fitbuddy/config:ro
      - ./workflows:/home/node/fitbuddy/workflows:ro
    ports:
      - "${N8N_PORT:-5050}:${N8N_PORT:-5050}"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:${N8N_PORT:-5050}/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
